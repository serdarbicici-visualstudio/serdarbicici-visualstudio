<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 28" width="800" height="28">
  <defs>
    <linearGradient id="tb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5aa3e8"/>
      <stop offset="50%"  stop-color="#2460b5"/>
      <stop offset="100%" stop-color="#0d3785"/>
    </linearGradient>
    <linearGradient id="cl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f07070"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="mm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#78b8e8"/>
      <stop offset="100%" stop-color="#3878b8"/>
    </linearGradient>
  </defs>
  <!-- Title bar -->
  <rect width="800" height="28" rx="4" fill="url(#tb)"/>
  <rect x="1" y="1" width="798" height="12" rx="3" fill="rgba(255,255,255,0.28)"/>
  <!-- Icon + title -->
  <text x="12" y="18" font-family="Tahoma,Verdana,Arial,sans-serif" font-size="12" font-weight="bold" fill="white">
    &#128100; About Me
  </text>
  <!-- Min -->
  <rect x="736" y="5" width="17" height="18" rx="2" fill="url(#mm)" stroke="#1a5bb8" stroke-width="0.5"/>
  <rect x="737" y="6" width="15" height="7"  rx="1" fill="rgba(255,255,255,0.25)"/>
  <line x1="739" y1="16" x2="750" y2="16" stroke="white" stroke-width="1.5"/>
  <!-- Max -->
  <rect x="756" y="5" width="17" height="18" rx="2" fill="url(#mm)" stroke="#1a5bb8" stroke-width="0.5"/>
  <rect x="757" y="6" width="15" height="7"  rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="760" y="8" width="9"  height="8"  rx="1" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Close -->
  <rect x="776" y="5" width="18" height="18" rx="2" fill="url(#cl)" stroke="#8b0000" stroke-width="0.5"/>
  <rect x="777" y="6" width="16" height="7"  rx="1" fill="rgba(255,255,255,0.20)"/>
  <line x1="780" y1="9" x2="790" y2="19" stroke="white" stroke-width="1.5"/>
  <line x1="790" y1="9" x2="780" y2="19" stroke="white" stroke-width="1.5"/>
</svg>
